version: "2"
run:
  go: '1.25'
linters:
  enable:
    - bodyclose
    - copyloopvar
    - dupword
    - durationcheck
    - errorlint
    - gosec
    - gocritic
    - misspell
    - nilerr
    - revive
    - staticcheck
    - unconvert
    - usestdlibvars
    - wastedassign
    - whitespace
  settings:
    gosec:
      excludes:
        - G101  # false positives on Go constant names and test fixtures
  exclusions:
    rules:
      - path: _test\.go
        linters: [gosec]
        text: "G304|G703"
      - path: "test/"
        linters: [gosec]
        text: "G304"
